<html>
<body>
<h2>URL Shortener</h2>
<input id="url" placeholder="Enter URL">
<button onclick="shorten()">Shorten</button>

<p id="result"></p>

<script>
function shorten() {
  const url = document.getElementById("url").value;

  fetch("https://oz25s5y03c.execute-api.us-east-1.amazonaws.com/prod/shorten", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url }),
  })
  .then(res => res.json())
  .then(data => {
    // 🔥 CAMBIO CLAVE
    const shortId = data.shortUrl.split("/").pop();
    const newUrl = `https://knil.vercel.app/api/${shortId}`;

    document.getElementById("result").innerText = newUrl;
  });
}
</script>
</body>
</html>
